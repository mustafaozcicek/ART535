  <script>
    AFRAME.registerComponent('play-snippet', {
      schema: {
        audioId: { type: 'selector' },
        duration: { type: 'number', default: 10000 } // Duration in milliseconds
      },
      init: function () {
        let el = this.el;
        let sound = this.data.audioId;

        el.addEventListener('click', () => {
          // Stop all other audio first (optional)
          document.querySelectorAll('audio').forEach(a => {
            a.pause();
            a.currentTime = 0;
          });

          // Play this specific track
          sound.play();

          // Stop it after the snippet duration
          setTimeout(() => {
            sound.pause();
            sound.currentTime = 0;
          }, this.data.duration);
        });
      }
    });
  </script>
