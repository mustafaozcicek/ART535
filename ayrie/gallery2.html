  <script src="https://cdn.jsdelivr.net/npm/aframe-blink-controls/dist/aframe-blink-controls.min.js"></script>

  <script>
    AFRAME.registerComponent('play-snippet', {
      schema: {
        duration: { type: 'number', default: 10000 }
      },

      init: function () {
        const el = this.el;
        let stopTimer;

        el.addEventListener('click', () => {
          document.querySelectorAll('[sound]').forEach(soundEl => {
            if (soundEl.components.sound) {
              soundEl.components.sound.stopSound();
            }
          });

          if (stopTimer) {
            clearTimeout(stopTimer);
          }

          if (el.components.sound) {
            el.components.sound.playSound();
          }

          stopTimer = setTimeout(() => {
            if (el.components.sound) {
              el.components.sound.stopSound();
            }
          }, this.data.duration);
        });
      }
    });

    AFRAME.registerComponent('hover-glow', {
      init: function () {
        const el = this.el;
        let originalScale;

        el.addEventListener('model-loaded', () => {
          originalScale = el.getAttribute('scale');

          el.object3D.traverse(node => {
            if (node.isMesh && node.material) {
              node.material = node.material.clone();
              node.userData.originalEmissive = node.material.emissive
                ? node.material.emissive.clone()
                : new THREE.Color('#000000');
              node.userData.originalEmissiveIntensity = node.material.emissiveIntensity || 0;
            }
          });
        });

        el.addEventListener('mouseenter', () => {
          if (!originalScale) originalScale = el.getAttribute('scale');

          el.object3D.traverse(node => {
            if (node.isMesh && node.material && node.material.emissive) {
              node.material.emissive.set('#FFD700');
              node.material.emissiveIntensity = 1.5;
            }
          });

          el.setAttribute('animation__hover_scale', {
            property: 'scale',
            dur: 150,
            easing: 'easeOutQuad',
            to: `${originalScale.x * 1.15} ${originalScale.y * 1.15} ${originalScale.z * 1.15}`
          });
        });

        el.addEventListener('mouseleave', () => {
          el.object3D.traverse(node => {
            if (node.isMesh && node.material && node.material.emissive) {
              node.material.emissive.copy(node.userData.originalEmissive || new THREE.Color('#000000'));
              node.material.emissiveIntensity = node.userData.originalEmissiveIntensity || 0;
            }
          });

          if (originalScale) {
            el.setAttribute('animation__hover_scale', {
              property: 'scale',
              dur: 150,
              easing: 'easeOutQuad',
              to: `${originalScale.x} ${originalScale.y} ${originalScale.z}`
            });
          }
        });
      }
    });
  </script>
