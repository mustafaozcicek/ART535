<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>

</head>
<body>

    <a-scene background="color: #FAFAFA">
        
        <a-assets>
            <a-asset-item id="hello2" src="hello2.obj"></a-asset-item>
            <a-asset-item id="hello2-mtl" src="hello2.mtl"></a-asset-item>
            <a-asset-item id="hello" src="hello2.gltf"></a-asset-item>

            <a-asset-item id="core-obj" src="core.obj"></a-asset-item>
            <a-asset-item id="core-mtl" src="core.mtl"></a-asset-item>
            <a-asset-item id="core-gltf" src="core.gltf"></a-asset-item>
            <a-asset-item id="core-glb" src="core.glb"></a-asset-item>

            <a-asset-item id="core-mesh-obj" src="core-mesh.obj"></a-asset-item>
            <a-asset-item id="core-mesh-mtl" src="core-mesh.mtl"></a-asset-item>
            <a-asset-item id="core-mesh-gltf" src="core-mesh.gltf"></a-asset-item>
            <a-asset-item id="core-mesh-glb" src="core-mesh.glb"></a-asset-item>
            
        </a-assets>

        <a-entity gltf-model="#hello" scale="10 10 10" position="0 0 -2" shadow></a-entity>
        <a-entity obj-model="obj: #hello2; mtl: #hello2-mtl" scale="1 1 1" position="0 0 -4" shadow></a-entity>
        <a-entity obj-model="obj: #core-mesh-obj; mtl: #core-mesh-mtl" scale="10 10 10" position="0 0 -4" rotation="90 0 0s" shadow></a-entity>

        
        
        <a-box position="-1 0.5 -3" rotation="0 45 0" color="#4CC3D9" shadow></a-box>
        <a-sphere position="0 1.25 -5" radius="1.25" color="#EF2D5E" shadow></a-sphere>
        <a-cylinder position="1 0.75 -3" radius="0.5" height="1.5" color="#FFC65D" shadow></a-cylinder>
        <a-plane position="0 0 -4" rotation="-90 0 0" width="4" height="4" color="#7BC8A4" shadow></a-plane>
    </a-scene>
    
    
</body>
</html>
