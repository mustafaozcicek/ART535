<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adding Models to A-Frame</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
</head>
<body>

    <a-scene background="color: #FAFAFA">

        <a-assets>
            <a-asset-item id="3dtext" src="models/3d-text.glb"></a-asset-item>

        </a-assets>

        <!-- Using the asset management system. -->
        <a-gltf-model src="#3dtext" position="-2 0 -7" scale="0.1 0.1 0.1"></a-gltf-model>



        <a-box position="-1 0.5 -3" rotation="0 45 0" color="#4CC3D9" shadow></a-box>
        <a-sphere position="0 1.25 -5" radius="1.25" color="#EF2D5E" shadow></a-sphere>
        <a-cylinder position="1 0.75 -3" radius="0.5" height="1.5" color="#FFC65D" shadow></a-cylinder>
        <a-plane position="0 0 -4" rotation="-90 0 0" width="4" height="4" color="#7BC8A4" shadow></a-plane>

        <a-plane position="0 -0.5 -4" rotation="90 0 0" width="4" height="4" color="#7BC8A4" src="letter-d-transparent.png" shadow></a-plane>
    </a-scene>
    
    
</body>
</html>
